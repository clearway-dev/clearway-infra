name: Infrastructure CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: pip install ruff sqlfluff

      # E9: syntax errors, F821: undefined names
      - name: Python — ruff
        run: ruff check scripts/ --select E9,F821

      # dialect, templater, and excluded rules are configured in .sqlfluff
      - name: SQL — sqlfluff
        run: sqlfluff lint db/migrations/ scripts/setup_routing.sql

  integration-test:
    name: Integration Test & Golden Image
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            postgresql-client \
            libgdal-dev

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      # PGDATA is overridden to /pgseed — a path outside the VOLUME declared by the
      # postgres base image (/var/lib/postgresql/data). docker commit captures all
      # filesystem changes except declared VOLUME mountpoints, so the seeded data
      # at /pgseed will be baked into the golden image.
      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name clearway-db \
            -e POSTGRES_USER=clearway \
            -e POSTGRES_PASSWORD=clearway_dev_password \
            -e POSTGRES_DB=clearway \
            -e PGDATA=/pgseed \
            -p 5432:5432 \
            pgrouting/pgrouting:15-3.5-3.7

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in $(seq 1 30); do
            docker exec clearway-db pg_isready -U clearway && break
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Apply base schema
        run: psql -h localhost -U clearway -d clearway -f db/init/001_schema.sql
        env:
          PGPASSWORD: clearway_dev_password

      # baselineVersion=4: V001–V004 were applied on top of the hand-crafted init schema
      # and are treated as already done; Flyway applies only V005 onwards on a fresh CI DB.
      - name: Run Flyway migrations
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}/db/migrations:/flyway/sql \
            flyway/flyway:10 \
            -url="jdbc:postgresql://localhost:5432/clearway" \
            -user=clearway \
            -password=clearway_dev_password \
            -baselineOnMigrate=true \
            -baselineVersion=4 \
            migrate

      - name: Seed OSM roads
        run: make seed-roads

      # make setup-routing calls `docker-compose exec db psql`, which requires a running
      # Compose stack. In CI psql is invoked directly — the SQL executed is identical.
      - name: Build pgRouting topology
        run: psql -h localhost -U clearway -d clearway -f scripts/setup_routing.sql
        env:
          PGPASSWORD: clearway_dev_password

      - name: Verify topology
        run: |
          VERTICES=$(psql -h localhost -U clearway -d clearway -tAc \
            "SELECT COUNT(*) FROM road_segments_vertices_pgr")
          EDGES=$(psql -h localhost -U clearway -d clearway -tAc \
            "SELECT COUNT(*) FROM road_segments WHERE source IS NOT NULL")
          echo "Vertices: $VERTICES  Edges: $EDGES"
          [ "$VERTICES" -gt 0 ] && [ "$EDGES" -gt 0 ]
        env:
          PGPASSWORD: clearway_dev_password

      # Stop postgres cleanly before committing to guarantee WAL is flushed and
      # the data directory is in a consistent state. The container moves to "exited"
      # state but remains accessible for docker commit.
      - name: Stop PostgreSQL cleanly
        run: docker stop clearway-db

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -c "ENV PGDATA=/pgseed" propagates the custom data directory into the image
      # so that a fresh `docker run` of the golden image starts with the seeded data.
      - name: Build and push golden image
        run: |
          IMAGE=ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')/clearway-db-seeded:latest
          docker commit \
            -c "ENV PGDATA=/pgseed" \
            -c "EXPOSE 5432" \
            clearway-db \
            $IMAGE
          docker push $IMAGE
